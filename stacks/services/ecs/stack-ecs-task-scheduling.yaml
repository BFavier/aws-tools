AWSTemplateFormatVersion: '2010-09-09'
Description: Defines a service that runs on an ECS cluster, with a load balancer in front

Parameters:
  ScheduleExpression:
    Type: String
    Description: "Schedule at which the task should run. Example: 'cron(0 20 * * ? *)'', 'rate(5 minutes)'. See https://docs.aws.amazon.com/eventbridge/latest/userguide/eb-create-rule-schedule.html"
  TaskDefinitionArn:
    Type: String
    Description: Arn of the ecs task definition resources
  EventbridgeTaskStartRoleArn:
    Type: String
    Description: Arn of the role that is authorized to start the specific task definition and pass it the execution and runner roles
  ClusterName:
    Type: String
    Description: Name of the cluster to run the task on
  ClusterType:
    Type: String
    Description: The type of clusters that the task should be compatible with. Might restrain the core/memory/disk space values that are valid.
    AllowedValues:
      - 'EC2'
      - 'FARGATE'
  SubnetIds:
    Type: CommaDelimitedList
    Description: IDs of the subnets (in different availability zones of the same VPC) to start the task in
  SecurityGroupIds:
    Type: CommaDelimitedList
    Description: IDs of the security groups

  AssignPublicIp:
    Type: String
    AllowedValues:
      - ENABLED
      - DISABLED
    Default: DISABLED
    Description: Whether a public IP should be created

Resources:
  MonthlyBillingSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: MonthlyBillingTask
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: RunTask
          Arn: !Sub
            - arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:cluster/${ClusterName}
            - ClusterName: !Ref ClusterName
          RoleArn: !Ref EventbridgeTaskStartRoleArn
          EcsParameters:
            TaskDefinitionArn: !Ref TaskDefinitionArn
            LaunchType: !Ref ClusterType
            NetworkConfiguration:
              AwsVpcConfiguration:
                Subnets: !Ref SubnetIds
                SecurityGroups: !Ref SecurityGroupIds
                AssignPublicIp: !Ref AssignPublicIp
